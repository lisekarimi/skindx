app = "skindx"
primary_region = "cdg"

[build]

[env]
  PYTHONPATH = "/app"
  STREAMLIT_SERVER_HEADLESS = "true"
  STREAMLIT_BROWSER_GATHER_USAGE_STATS = "false"
  HF_HOME = "/tmp/.cache"
  STREAMLIT_CONFIG_DIR = "/tmp/.streamlit"

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 1

# Streamlit UI — skindx.lisekarimi.com
[[services]]
  internal_port = 7860
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

# FastAPI — direct API access on :8000
[[services]]
  internal_port = 8000
  protocol = "tcp"

  [[services.ports]]
    port = 8000
    handlers = ["http"]
