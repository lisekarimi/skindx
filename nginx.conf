# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=stream:10m rate=2r/s;
limit_conn_zone $binary_remote_addr zone=addr:10m;

server {
    listen 80;
    server_name localhost;

    # Increase limits
    client_max_body_size 10M;
    proxy_read_timeout 60s;
    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;

    # Block empty user agents (most scanners)
    if ($http_user_agent = "") {
        return 403;
    }

    # Block known scanners and bad bots
    if ($http_user_agent ~* "(CMS-Checker|zgrab|masscan|nikto|sqlmap|nmap|python-requests/2\.[0-2])") {
        return 403;
    }

    # Max 10 concurrent connections per IP
    limit_conn addr 10;

    # Static assets - no rate limiting, browsers load these in parallel
    location /static/ {
        proxy_pass http://localhost:7860;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;

        # Cache static assets in browser
        add_header Cache-Control "public, max-age=3600";
    }

    # Main app - Streamlit UI
    location / {
        limit_req zone=general burst=20 nodelay;

        proxy_pass http://localhost:7860;
        proxy_http_version 1.1;

        # WebSocket support for Streamlit
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering
        proxy_buffering off;
    }

    # Tighter limit on WebSocket stream (most expensive endpoint)
    location /_stcore/stream {
        limit_req zone=stream burst=5 nodelay;

        proxy_pass http://localhost:7860;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # FastAPI endpoints
    location ~ ^/(health|predict|openapi.json)$ {
        limit_req zone=general burst=10 nodelay;

        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger API docs
    location /api-docs {
        proxy_pass http://localhost:8000/api-docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
